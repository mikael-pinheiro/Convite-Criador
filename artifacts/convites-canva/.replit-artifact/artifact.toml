kind = "web"
previewPath = "/"
title = "Convites Canva"
version = "1.0.0"
id = "artifacts/convites-canva"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21628

[services.development]
run = "pnpm --filter @workspace/convites-canva run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/convites-canva", "run", "build" ]
publicDir = "artifacts/convites-canva/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21628"
BASE_PATH = "/"
